<!-- mascota-componentes.html -->
<div class="modal-overlay" *ngIf="mostrarModal">
  <div class="modal-container">
    <div class="modal-header">
      <h2>Añadir nueva mascota</h2>
    </div>

    <form [formGroup]="mascotaForm" (ngSubmit)="guardarMascota()">
      <div class="form-group">
        <label>Nombre de la mascota</label>
        <input type="text" formControlName="nombre" placeholder="Ej. Toby">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Especie</label>
          <select formControlName="especie">
            <option value="Canino">Canino</option>
            <option value="Felino">Felino</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Raza</label>
        <input type="text" formControlName="raza" placeholder="Ej. Husky">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha de Nacimiento</label>
          <input type="date" formControlName="fechaNacimiento">
        </div>
        <div class="form-group">
          <label>Peso (kg)</label>
          <input type="number" formControlName="peso" step="0.1">
        </div>
      </div>

      <div class="upload-section">
        <label>Subir una foto</label>
        <div class="upload-placeholder">
          <i class="upload-icon"></i> <!-- Puedes usar un icono de FontAwesome -->
          <input type="file" (change)="onFileSelected($event)" class="file-input">
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-save" [disabled]="mascotaForm.invalid">Guardar mascota</button>
      </div>
    </form>
  </div>
</div>
